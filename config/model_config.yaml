# GTO v6.0 主配置文件
# 所有参数集中管理，修改此文件即可调整模型行为

# 全局显示配置
display:
  language: "zh-CN"
  team_names: "chinese"  # 所有球队名使用中文
  league_names: "chinese"  # 所有联赛名使用中文
  strategy_names: "chinese"  # 所有策略名使用中文
  direction_names: "chinese"  # 所有方向名使用中文
  odds_format: "decimal"  # 赔率格式
  percentage_format: "100"  # 百分比格式

# 联赛配置
leagues:
  premier_league:
    name: "英超"
    avg_goals: 2.98
    home_advantage: 0.38
    draw_rate: 0.225
    sigma: 1.70
    elo_k: 20
    elo_home_adv: 65
    dc_rho: -0.08
    factor_scale: 0.23
    fusion_weight: 0.60
    calibration_discount: 0.15
    confidence_threshold: 0.36

  la_liga:
    name: "西甲"
    avg_goals: 2.55
    home_advantage: 0.42
    draw_rate: 0.26
    sigma: 1.50
    elo_k: 20
    elo_home_adv: 70
    dc_rho: -0.10
    factor_scale: 0.25
    fusion_weight: 0.60
    calibration_discount: 0.15
    confidence_threshold: 0.35

  bundesliga:
    name: "德甲"
    avg_goals: 3.17
    home_advantage: 0.45
    draw_rate: 0.249
    sigma: 1.74
    elo_k: 25
    elo_home_adv: 80
    dc_rho: -0.06
    factor_scale: 0.22
    fusion_weight: 0.55
    calibration_discount: 0.15
    confidence_threshold: 0.37

  serie_a:
    name: "意甲"
    avg_goals: 2.65
    home_advantage: 0.40
    draw_rate: 0.28
    sigma: 1.55
    elo_k: 20
    elo_home_adv: 75
    dc_rho: -0.13
    factor_scale: 0.20
    fusion_weight: 0.65
    calibration_discount: 0.18
