# GTO-GameFlow v5.5 — Docker Compose (PostgreSQL + Adminer)
#
# 启动方式:
#   docker compose -f deploy/docker/docker-compose.yml up -d
#
# 停止:
#   docker compose -f deploy/docker/docker-compose.yml down
#
# 数据持久化: ./data/postgres 目录挂载到容器

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gto_gameflow
      POSTGRES_USER: gto
      POSTGRES_PASSWORD: ${GTO_DB_PASSWORD:-gto_gameflow_2026}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gto -d gto_gameflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "wal_buffers=8MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"

  adminer:
    image: adminer:4-standalone
    container_name: gto-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy