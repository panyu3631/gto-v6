# GTO-GameFlow v5.5 — Alembic 迁移配置

[alembic]
# 迁移脚本目录
script_location = migrations
# 预处理 SQL 文件
prepend_sys_path = .

# SQLAlchemy URL (由环境变量或 alembic.ini 覆盖)
sqlalchemy.url = postgresql://gto:gto_gameflow_2026@localhost:5432/gto_gameflow

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S