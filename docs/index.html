            const hLam=1.25*(1+diff/800);const aLam=1.25*(1-diff/800);
            const sm=[];
            for(let h=0;h<=4;h++)for(let a=0;a<=4;a++){sm.push({score:`${h}-${a}`,prob:poissonPmf(h,hLam)*poissonPmf(a,aLam),h,a})}
            sm.sort((a,b)=>b.prob-a.prob);

            // 大小球概率
            let over25=0,under25=0;
            for(let h=0;h<=6;h++)for(let a=0;a<=6;a++){const p=poissonPmf(h,hLam)*poissonPmf(a,aLam);if(h+a>2.5)over25+=p;else under25+=p}

            // 因子
            const factors=[
                {name:'F1 Elo差值',value:diff/400*0.5},
                {name:'F3 近期状态',value:(getForm(home)-getForm(away))*0.15},
                {name:'F7 排名差',value:(getRank(away)-getRank(home))/20*0.1},
                {name:'F20 连胜动量',value:getStreak(home)*0.08},
                {name:'F33 保级动力',value:getMotivation(home,away)*0.05},
                {name:'F56 战术平局',value:diff<50&&diff>-50?0.03:-0.02},
                {name:'F57 进球预期',value:(hLam+aLam)>2&&(hLam+aLam)<2.8?0.02:-0.01},
                {name:'F58 平局倾向',value:getDrawRate(home)*0.06},
            ];

            // 获取真实赔率
            const matchKey=home.replace(/ /g,'')+'_vs_'+away.replace(/ /g,'');
            const odds=realOdds[matchKey]||{h:1/(hp*1.05),d:1/(dp*1.05),a:1/(ap*1.05)};

            // 1X2推荐
            let rec1x2={};const probs={home:hp,draw:dp,away:ap};const oddsMap={home:odds.h,draw:odds.d,away:odds.a};
            for(const d of['home','draw','away']){
                const v=probs[d]-1/oddsMap[d];
                rec1x2[d]={prob:probs[d],odds:oddsMap[d],value:v,rec:v>0.03};
            }

            // 大小球推荐
            const ouOdds={over:1/(over25*1.05),under:1/(under25*1.05)};
            const ouRec={over:{prob:over25,odds:ouOdds.over,value:over25-1/ouOdds.over},under:{prob:under25,odds:ouOdds.under,value:under25-1/ouOdds.under}};

            // 比分推荐
            const topScores=sm.slice(0,3).map(s=>({score:s.score,prob:s.prob,odds:1/(s.prob*1.05)}));

            return{home:Math.round(hp*1000)/10,draw:Math.round(dp*1000)/10,away:Math.round(ap*1000)/10,
                hLam:Math.round(hLam*100)/100,aLam:Math.round(aLam*100)/100,totalLam:Math.round((hLam+aLam)*100)/100,
                scoreMatrix:sm.slice(0,10),factors,rec1x2,ouRec,topScores,
                over25:Math.round(over25*1000)/10,under25:Math.round(under25*1000)/10};
        }

        function getForm(t){return{'Argentina':2.5,'France':2.4,'Brazil':2.3,'England':2.2,'Germany':2.4,'Spain':2.0}[t]||1.5}
        function getRank(t){return{'Argentina':1,'France':2,'Brazil':3,'England':4,'Spain':5,'Germany':6}[t]||20}
        function getStreak(t){return{'Argentina':0.6,'France':0.4,'Brazil':0.2,'England':0.8,'Germany':1.0,'Spain':-0.2}[t]||0}
        function getMotivation(h,a){const hr=getRank(h);if(hr<=3)return 0.5;if(getRank(a)<=3)return-0.3;return 0}
        function getDrawRate(t){return{'Spain':0.28,'Belgium':0.25,'Brazil':0.22,'Argentina':0.20,'France':0.23}[t]||0.25}

        // 渲染比赛卡片
        function renderMatch(m){
            const hCn=wcCn[m.h]||m.h;const aCn=wcCn[m.a]||m.a;
            const hasResult=m.hs!==undefined&&m.hs!==null;
            const p=fullPredict(m.h,m.a);
            let scoreHtml=hasResult?`<span style="font-weight:700;margin-left:12px;">${m.hs}-${m.as}</span>`:'';
            let rec='skip',recText='观望';
            if(p.home>45){rec='bet';recText=hCn}else if(p.away>45){rec='bet';recText=aCn}
            return`<div class="match" onclick="showDetail('${m.h}','${m.a}','${m.g}','${m.date||''}',${hasResult?m.hs:'null'},${hasResult?m.as:'null'})">
                <div class="match-top"><span class="match-time">${m.date||''}</span><span class="match-group">${m.g}组</span></div>
                <div class="match-teams">${hCn} <span class="vs">VS</span> ${aCn}${scoreHtml}</div>
                <div class="match-bottom"><div class="prob-bar"><div class="h" style="width:${p.home}%"></div><div class="d" style="width:${p.draw}%"></div><div class="a" style="width:${p.away}%"></div></div><div class="match-rec ${rec}">${recText}</div></div></div>`;
        }

        // 显示详情
        function showDetail(home,away,group,date,hs,as_){
            const hCn=wcCn[home]||home;const aCn=wcCn[away]||away;
            const p=fullPredict(home,away);

            // 基础信息
            document.getElementById('detail-group').textContent=group+'组';
            document.getElementById('detail-teams-text').textContent=hCn+' vs '+aCn;
            document.getElementById('detail-score').textContent=(hs!==null&&hs!==undefined)?`${hs} - ${as_}`:'未开始';
            document.getElementById('detail-date').textContent='📅 '+(date||'-');
            document.getElementById('detail-venue').textContent='🏟️ 中立场';

            // 1X2概率
            document.getElementById('prob-home').textContent=p.home+'%';
            document.getElementById('prob-draw').textContent=p.draw+'%';
            document.getElementById('prob-away').textContent=p.away+'%';
            document.getElementById('bar-home').style.width=p.home+'%';
            document.getElementById('bar-draw').style.width=p.draw+'%';
            document.getElementById('bar-away').style.width=p.away+'%';

            // 1X2投注建议
            let card1x2='<div class="rec-title">1X2 胜平负</div><div class="rec-grid">';
            const dirMap={home:'主胜',draw:'平局',away:'客胜'};
            const dirColor={home:'#3fb950',draw:'#d29922',away:'#f85149'};
            let best1x2='';let bestVal1x2=-999;
            for(const d of['home','draw','away']){
                const r=p.rec1x2[d];if(r.value>bestVal1x2){bestVal1x2=r.value;best1x2=d}
            }
            for(const d of['home','draw','away']){
                const r=p.rec1x2[d];const isBest=d===best1x2&&r.value>0;
                card1x2+=`<div class="rec-option${isBest?' best':''}"><div class="opt-label">${dirMap[d]}</div><div class="opt-odds" style="color:${dirColor[d]}">${r.odds.toFixed(2)}</div><div class="opt-prob">${(r.prob*100).toFixed(1)}%</div><div class="opt-value ${r.value>0?'pos':'neg'}">${r.value>0?'+':''}${(r.value*100).toFixed(1)}%</div></div>`;
            }
            card1x2+='</div>';
            const bestRec1x2=p.rec1x2[best1x2];
            if(bestRec1x2.value>0){
                const kelly=((bestRec1x2.odds-1)*bestRec1x2.prob-(1-bestRec1x2.prob))/(bestRec1x2.odds-1);
                card1x2+=`<div class="rec-details"><div class="item"><span class="label">推荐方向</span><span style="color:${dirColor[best1x2]};font-weight:700">${dirMap[best1x2]}</span></div><div class="item"><span class="label">价值优势</span><span style="color:#3fb950">+${(bestRec1x2.value*100).toFixed(1)}%</span></div><div class="item"><span class="label">Kelly比例</span><span>${(kelly*100).toFixed(1)}%</span></div><div class="item"><span class="label">建议金额</span><span>¥${Math.round(kelly*200)}</span></div></div>`;
            }
            document.getElementById('rec-1x2-card').innerHTML=card1x2;

            // 大小球投注建议
            let cardOu='<div class="rec-title">大小球 2.5</div><div class="rec-grid">';
            let bestOu='';let bestValOu=-999;
            for(const d of['over','under']){
                const r=p.ouRec[d];if(r.value>bestValOu){bestValOu=r.value;bestOu=d}
            }
            for(const d of['over','under']){
                const r=p.ouRec[d];const isBest=d===bestOu&&r.value>0;
                const label=d==='over'?'大球(>2.5)':'小球(<2.5)';const color=d==='over'?'#3fb950':'#f85149';
                cardOu+=`<div class="rec-option${isBest?' best':''}"><div class="opt-label">${label}</div><div class="opt-odds" style="color:${color}">${r.odds.toFixed(2)}</div><div class="opt-prob">${(r.prob*100).toFixed(1)}%</div><div class="opt-value ${r.value>0?'pos':'neg'}">${r.value>0?'+':''}${(r.value*100).toFixed(1)}%</div></div>`;
            }
            cardOu+='</div>';
            const bestRecOu=p.ouRec[bestOu];
            if(bestRecOu.value>0){
                cardOu+=`<div class="rec-details"><div class="item"><span class="label">推荐方向</span><span style="color:${bestOu==='over'?'#3fb950':'#f85149'};font-weight:700">${bestOu==='over'?'大球':'小球'}</span></div><div class="item"><span class="label">预期进球</span><span>${p.totalLam}</span></div><div class="item"><span class="label">价值优势</span><span style="color:#3fb950">+${(bestRecOu.value*100).toFixed(1)}%</span></div></div>`;
            }
            document.getElementById('rec-ou-card').innerHTML=cardOu;

            // 比分推荐
            let cardScore='<div class="rec-title">比分推荐 (Top 3)</div><div class="rec-grid">';
            p.topScores.forEach((s,i)=>{
                const isBest=i===0;
                cardScore+=`<div class="rec-option${isBest?' best':''}"><div class="opt-label">${s.score}</div><div class="opt-odds" style="color:#58a6ff">${s.odds.toFixed(1)}</div><div class="opt-prob">${(s.prob*100).toFixed(1)}%</div></div>`;
            });
            cardScore+='</div>';
            document.getElementById('rec-score-card').innerHTML=cardScore;

            // 因子
            let fHtml='';
            p.factors.forEach(f=>{
                const pct=Math.min(100,Math.abs(f.value)*200);const cls=f.value>=0?'pos':'neg';
                fHtml+=`<div class="factor-item"><span class="name">${f.name}</span><div class="bar"><div class="fill ${cls}" style="width:${pct}%"></div></div><span class="value" style="color:${f.value>=0?'#3fb950':'#f85149'}">${f.value>=0?'+':''}${f.value.toFixed(3)}</span></div>`;
            });
            document.getElementById('factor-list').innerHTML=fHtml;

            // 比分矩阵
            let sHtml='';
            p.scoreMatrix.forEach((s,i)=>{
                sHtml+=`<div class="score-cell${i<3?' top':''}"><div class="score">${s.score}</div><div class="prob">${(s.prob*100).toFixed(1)}%</div></div>`;
            });
            document.getElementById('score-grid').innerHTML=sHtml;

            // 天气/伤停
            const weatherData={'Madrid':{temp:38,wind:12,precip:0,desc:'晴天'},'Paris':{temp:28,wind:8,precip:0,desc:'多云'},'Munich':{temp:22,wind:15,precip:2,desc:'小雨'},'New York':{temp:30,wind:10,precip:0,desc:'晴天'},'Atlanta':{temp:35,wind:8,precip:0,desc:'晴天'}};
            const cityMap={'Spain':'Madrid','France':'Paris','Germany':'Munich','Brazil':'São Paulo','Argentina':'Buenos Aires','England':'London'};
            const w=weatherData[cityMap[home]]||{temp:25,wind:10,precip:0,desc:'未知'};
            document.getElementById('info-temp').textContent=w.temp+'°C';
            document.getElementById('info-wind').textContent=w.wind+' km/h';
            document.getElementById('info-precip').textContent=w.precip+' mm';
            document.getElementById('detail-weather').textContent='🌤️ '+w.desc+' '+w.temp+'°C';
            const injuryData={'Spain':'加维(膝盖) 佩德里(肌肉)','France':'姆巴佩(脚踝)','Germany':'穆西亚拉(肌肉)','Brazil':'内马尔(膝盖)','Argentina':'迪马利亚(肌肉)','England':'福登(脚踝)'};
            document.getElementById('info-injuries').textContent=injuryData[home]||'无数据';

            // 显示
            document.getElementById('detailOverlay').style.display='block';
            document.getElementById('detailPage').style.display='block';
        }

        function closeDetail(){
            document.getElementById('detailOverlay').style.display='none';
            document.getElementById('detailPage').style.display='none';
        }

        // 初始化
        function initWc(){
            const today=[],upcoming=[],finished=[];
            for(const[date,games]of Object.entries(wcResults)){
                for(const g of games){
                    const m={...g,date};
                    if(date==='2026-06-21')today.push(m);
                    else if(m.hs!==undefined&&m.hs!==null)finished.push(m);
                    else upcoming.push(m);
                }
            }
            renderWcMatches('wc-today-matches',today);
            renderWcMatches('wc-upcoming-matches',upcoming);
            renderWcMatches('wc-finished-matches',finished);
            renderStandings();
            document.getElementById('wc-today-count').textContent=today.length;
            const recCount=today.filter(m=>{const p=fullPredict(m.h,m.a);return p.home>45||p.away>45}).length;
            document.getElementById('wc-today-rec').textContent=recCount;
            document.getElementById('wc-upcoming-count').textContent=upcoming.length+'场';
        }

        function renderWcMatches(id,matches){
            let html='',last='';
            for(const m of matches){if(m.date&&m.date!==last){html+=`<div class="date-group">${m.date}</div>`;last=m.date}html+=renderMatch(m)}
            document.getElementById(id).innerHTML=html||'<div style="padding:40px;text-align:center;color:#484f58;">暂无比赛</div>';
        }

        function renderStandings(){
            let html='';
            for(const[group,teams]of Object.entries(wcGroups)){
                const stats={};teams.forEach(t=>stats[t]={team:t,teamCn:wcCn[t],p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
                for(const[date,games]of Object.entries(wcResults)){
                    for(const g of games){if(g.g!==group||g.hs===undefined)continue;
                        if(stats[g.h]){stats[g.h].p++;stats[g.h].gf+=g.hs;stats[g.h].ga+=g.as;stats[g.h].gd=stats[g.h].gf-stats[g.h].ga}
                        if(stats[g.a]){stats[g.a].p++;stats[g.a].gf+=g.as;stats[g.a].ga+=g.hs;stats[g.a].gd=stats[g.a].gf-stats[g.a].ga}
                        if(g.hs>g.as){if(stats[g.h]){stats[g.h].w++;stats[g.h].pts+=3}if(stats[g.a])stats[g.a].l++}
                        else if(g.hs<g.as){if(stats[g.a]){stats[g.a].w++;stats[g.a].pts+=3}if(stats[g.h])stats[g.h].l++}
                        else{if(stats[g.h]){stats[g.h].d++;stats[g.h].pts++}if(stats[g.a]){stats[g.a].d++;stats[g.a].pts++}}
                    }
                }
                const sorted=Object.values(stats).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
                html+=`<div class="section"><div class="section-header"><h2>${group}组</h2></div><div class="standings"><table><tr><th>#</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进</th><th>失</th><th>净</th><th>分</th></tr>`;
                sorted.forEach((t,i)=>{html+=`<tr><td>${i+1}</td><td class="team">${t.teamCn}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>0?'+':''}${t.gd}</td><td class="pts">${t.pts}</td></tr>`});
                html+=`</table></div></div>`;
            }
            document.getElementById('wc-standings-content').innerHTML=html;
        }

        function showMain(id){document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('[id^="main-"]').forEach(el=>el.classList.add('hidden'));event.target.classList.add('active');document.getElementById('main-'+id).classList.remove('hidden')}
        function showWc(id){document.querySelectorAll('#main-wc .sub-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('[id^="wc-"]').forEach(el=>{if(el.id.startsWith('wc-')&&!el.id.includes('content'))el.classList.add('hidden')});event.target.classList.add('active');document.getElementById('wc-'+id).classList.remove('hidden')}

        initWc();
    </script>
</body>
</html>
